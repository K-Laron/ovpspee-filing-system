plugins {
    id("com.android.application")
    id("com.facebook.react")
}

react {
    autolinkLibrariesWithApp()
}

android {
    namespace "com.ovpspeemobile"
    compileSdk 36

    defaultConfig {
        applicationId "com.ovpspeemobile"
        minSdkVersion 24
        targetSdkVersion 36
        versionCode 2
        versionName "0.1.1"
        externalNativeBuild {
            cmake {
                arguments "-DANDROID_STL=c++_shared",
                    "-DCMAKE_SHARED_LINKER_FLAGS=-lc++_shared"
            }
        }
    }

    signingConfigs {
        release {
            def storeFilePath = System.getenv("OVPSPEE_ANDROID_KEYSTORE")
            if (storeFilePath != null && storeFilePath.trim()) {
                storeFile file(storeFilePath)
                storePassword System.getenv("OVPSPEE_ANDROID_KEYSTORE_PASSWORD")
                keyAlias System.getenv("OVPSPEE_ANDROID_KEY_ALIAS")
                keyPassword System.getenv("OVPSPEE_ANDROID_KEY_PASSWORD")
            }
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")
}
